# EnderExtend Configuration
# Размер эндер-сундука по группам LuckPerms
# Значение = количество строк (от 1 до 6)

groups:
  # Группа: количество строк
  blackfury: 6
  nefelim: 6
  levik: 5
  hellhound: 5
  fury: 4
  player: 4
  # Для всех остальных игроков (по умолчанию)
  default: 3

# Автовыдача группы при входе (если у игрока нет ни одной группы из списка выше)
auto-join-group:
  enabled: true
  group: "player"

# Заголовок инвентаря (поддерживает &-коды цветов)
inventory-title: "&8Эндер-сундук"

# Сохранять данные при выходе игрока
save-on-quit: true

# Выводить сообщение при открытии сундука (true/false)
show-open-message: false
open-message: "&7[EnderExtend] &aЭндер-сундук открыт (&e{rows} строк&a)"
